name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-checks:
    strategy:
      matrix:
        # Cover GNU userland (linux) AND BSD userland (macos) so portability
        # bugs like `readlink -f` are caught in CI, not by a user.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install shellcheck (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: install shellcheck (macos)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: shellcheck (informational) + hard syntax check
        run: |
          shellcheck install.sh uninstall.sh bench/scripts/run_suite.sh bench/scripts/tool_call_smoke.sh tools/build_installer.sh || true
          # Hard checks (must pass)
          bash -n install.sh
          bash -n uninstall.sh
          bash -n bench/scripts/run_suite.sh
          bash -n bench/scripts/tool_call_smoke.sh
          bash -n tools/build_installer.sh

      - name: single-file installer builds
        run: |
          ./tools/build_installer.sh
          bash -n dist/nimcode-installer.sh

      - name: python syntax
        run: |
          python3 -m py_compile bench/scripts/headless_agent.py

      - name: opencode.json valid
        run: |
          python3 -c "import json; d=json.load(open('opencode.json')); assert 'provider' in d and 'nim' in d['provider'], 'opencode.json missing nim provider'; print('models:', list(d['provider']['nim']['models']))"

