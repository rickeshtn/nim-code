name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: build single-file installer
        run: ./tools/build_installer.sh

      - name: verify it parses
        run: bash -n dist/nimcode-installer.sh

      - name: dual-name the artifact
        # Upload both a versioned and a stable name so users can pin a version
        # or always grab "latest" via a permanent URL.
        run: |
          cp dist/nimcode-installer.sh "dist/nimcode-installer-${GITHUB_REF_NAME}.sh"
          ls -la dist/

      - name: upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nimcode-installer.sh
            dist/nimcode-installer-*.sh
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            # nim-code ${{ github.ref_name }}

            **Lazy install (always works, always latest):**

            ```bash
            printf '%s\n' 'nvapi-PASTE_YOUR_KEY_HERE' > ~/.nvidia_api_key && chmod 600 ~/.nvidia_api_key
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/nimcode-installer.sh | bash
            nimcode
            ```

            **Pinned to this version:**

            ```bash
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nimcode-installer-${{ github.ref_name }}.sh
            chmod +x nimcode-installer-${{ github.ref_name }}.sh
            ./nimcode-installer-${{ github.ref_name }}.sh
            ```

            See [README](https://github.com/${{ github.repository }}#readme) and [`docs/benchmarks.md`](https://github.com/${{ github.repository }}/blob/main/docs/benchmarks.md) for details.
